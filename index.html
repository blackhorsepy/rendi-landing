<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDI — Claridad Financiera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #030712;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(25, 224, 168, 0.24), transparent 42%),
                radial-gradient(circle at 85% 80%, rgba(25, 224, 168, 0.18), transparent 38%),
                linear-gradient(160deg, #020617 0%, #000000 55%, #020617 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e5e7eb;
        }
        .bg-grid {
            background-image: radial-gradient(rgba(25, 224, 168, 0.25) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            background-position: -19px -19px;
        }
        .neo-card {
            background: #111827;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border-radius: 32px;
        }
        .btn-mint {
            background: #19e0a8;
            box-shadow: 0 10px 20px rgba(25, 224, 168, 0.2);
            transition: all 0.3s ease;
        }
        .btn-mint:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(25, 224, 168, 0.3);
        }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(25, 224, 168, 0.22) 0%, rgba(25, 224, 168, 0.08) 35%, rgba(25, 224, 168, 0) 70%);
            transition: opacity 0.25s ease;
            filter: blur(8px);
        }
        .dollar-float {
            position: fixed;
            top: 50%;
            left: 58%;
            width: 1200px;
            height: auto;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%) rotate(-10deg);
            opacity: 0.12;
            object-fit: contain;
            filter: saturate(1.03) blur(1px) hue-rotate(-8deg);
            mix-blend-mode: screen;
            -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 18%, rgba(0,0,0,0.7) 45%, rgba(0,0,0,0.22) 68%, rgba(0,0,0,0) 88%);
            mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 18%, rgba(0,0,0,0.7) 45%, rgba(0,0,0,0.22) 68%, rgba(0,0,0,0) 88%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }
        .neo-card {
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        @media (max-width: 768px) {
            .dollar-float {
                left: 62%;
                width: 760px;
                height: auto;
                opacity: 0.11;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-grid flex flex-col items-center justify-between p-6 md:p-12">
    <div class="cursor-glow" aria-hidden="true"></div>
    <img src="dollar.jpg" alt="" class="dollar-float" aria-hidden="true" />

    <header class="w-full max-w-6xl flex justify-between items-center relative z-10">
        <div class="flex items-center gap-2">
            <img src="rendilogo.ico" alt="Rendi logo" class="h-36 w-36 md:h-48 md:w-48 rounded-xl object-cover" />
        </div>
    </header>

    <main class="w-full max-w-4xl text-center py-12 relative z-10">
        <div class="inline-block px-4 py-1 rounded-full bg-[#19e0a8]/10 text-[#11b68a] text-xs font-bold mb-6 tracking-widest uppercase">
            WhatsApp + IA + Finanzas
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-gray-100 mb-8 leading-[1.1]">
            Chau a las planillas.<br>Hola a <span class="text-[#19e0a8]">WhatsApp.</span>
        </h1>
        
        <p class="text-lg md:text-xl text-gray-300 max-w-2xl mx-auto mb-14 font-medium leading-relaxed md:leading-loose">
            <span class="block">Rendi extrae datos de tus facturas automáticamente usando IA.</span>
            <span class="block mt-2 md:mt-3">Registra tus gastos en menos de 10 segundos.</span>
        </p>

        <div class="neo-card p-8 md:p-12 flex flex-col md:flex-row items-center gap-8 md:gap-16 justify-center">
            <div class="text-left space-y-2">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Estado del Sistema</p>
                <h3 class="text-2xl font-bold flex items-center gap-3">
                    Beta Privada 
                    <span class="flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-[#19e0a8] opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-[#19e0a8]"></span>
                    </span>
                </h3>
            </div>
            <div class="h-px md:h-12 w-24 md:w-px bg-gray-100"></div>
            <a href="#" class="btn-mint px-12 py-5 rounded-2xl text-black font-extrabold text-lg uppercase tracking-tight">
                QUIERO PROBARLO
            </a>
        </div>
    </main>

    <footer class="w-full max-w-6xl border-t border-black/5 pt-12">
        <div class="space-y-2 text-center md:text-right">
            <p class="mono opacity-40 uppercase">Dashboard</p>
            <a href="https://rendi-dashboard.vercel.app" class="text-sm font-bold underline hover:text-[#19e0a8]">Acceso Usuarios →</a>
        </div>
    </footer>

<script>
    const glow = document.querySelector('.cursor-glow');
    const card = document.querySelector('.neo-card');

    document.addEventListener('mousemove', (event) => {
        glow.style.opacity = '1';
        glow.style.transform = `translate(${event.clientX - 160}px, ${event.clientY - 160}px)`;
    });

    document.addEventListener('mouseleave', () => {
        glow.style.opacity = '0';
    });

    if (card) {
        card.addEventListener('mousemove', (event) => {
            const rect = card.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const rotateY = ((x / rect.width) - 0.5) * 8;
            const rotateX = (0.5 - (y / rect.height)) * 8;
            card.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.boxShadow = '0 24px 45px rgba(0,0,0,0.35)';
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
            card.style.boxShadow = '0 20px 40px rgba(0,0,0,0.25)';
        });
    }
</script>
</body>
</html>
