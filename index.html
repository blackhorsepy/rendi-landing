<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDI — Claridad Financiera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #030712;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(25, 224, 168, 0.24), transparent 42%),
                radial-gradient(circle at 85% 80%, rgba(25, 224, 168, 0.18), transparent 38%),
                linear-gradient(160deg, #020617 0%, #000000 55%, #020617 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e5e7eb;
        }
        .bg-grid {
            background-image: radial-gradient(rgba(25, 224, 168, 0.25) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            background-position: -19px -19px;
        }
        .neo-card {
            background: #111827;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border-radius: 32px;
        }
        .btn-mint {
            background: #19e0a8;
            box-shadow: 0 10px 20px rgba(25, 224, 168, 0.2);
            transition: all 0.3s ease;
        }
        .btn-mint:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(25, 224, 168, 0.3);
        }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 320px;
            border-radius: 999px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(25, 224, 168, 0.22) 0%, rgba(25, 224, 168, 0.08) 35%, rgba(25, 224, 168, 0) 70%);
            transition: opacity 0.25s ease;
            filter: blur(8px);
        }
        .money-flow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .money-tick {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
            opacity: 0;
            animation: money-drift var(--dur, 5s) ease-out forwards;
            transform: translate3d(0, 0, 0);
        }
        .money-in {
            color: rgba(25, 224, 168, 0.88);
            text-shadow: 0 0 12px rgba(25, 224, 168, 0.45);
        }
        .money-out {
            color: rgba(248, 113, 113, 0.88);
            text-shadow: 0 0 12px rgba(248, 113, 113, 0.4);
        }
        @keyframes money-drift {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0) scale(0.96);
            }
            12% {
                opacity: 0.88;
            }
            85% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
                transform: translate3d(var(--dx, 90px), var(--dy, -120px), 0) scale(1.02);
            }
        }
        .dollar-float {
            position: fixed;
            top: 50%;
            left: 58%;
            width: 1200px;
            height: auto;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%) rotate(-10deg);
            opacity: 0.12;
            object-fit: contain;
            filter: saturate(1.03) blur(1px) hue-rotate(-8deg);
            mix-blend-mode: screen;
            -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 18%, rgba(0,0,0,0.7) 45%, rgba(0,0,0,0.22) 68%, rgba(0,0,0,0) 88%);
            mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 18%, rgba(0,0,0,0.7) 45%, rgba(0,0,0,0.22) 68%, rgba(0,0,0,0) 88%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            animation: dollar-zoom 24s ease-in-out infinite;
        }
        @keyframes dollar-zoom {
            0% {
                transform: translate(-50%, -50%) rotate(-10deg) scale(0.97);
            }
            50% {
                transform: translate(-50%, -50%) rotate(-10deg) scale(1.04);
            }
            100% {
                transform: translate(-50%, -50%) rotate(-10deg) scale(0.97);
            }
        }
        .neo-card {
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .manifesto-line {
            display: block;
        }
        .manifesto-line:first-child {
            order: 1;
        }
        .manifesto-line:last-child {
            order: 2;
            margin-top: 1rem;
        }
        @media (max-width: 1024px) {
            .dollar-float {
                left: 60%;
                width: 920px;
                opacity: 0.1;
            }
        }
        @media (max-width: 768px) {
            .cursor-glow {
                display: none;
            }
            .money-tick {
                animation-duration: 4.8s;
            }
            .dollar-float {
                left: 64%;
                width: 640px;
                height: auto;
                opacity: 0.08;
            }
            .neo-card {
                border-radius: 24px;
            }
        }
        @media (max-width: 480px) {
            .dollar-float {
                left: 70%;
                width: 520px;
                opacity: 0.06;
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-grid flex flex-col items-center justify-between px-4 py-5 sm:px-6 sm:py-6 md:p-10 xl:p-12">
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="money-flow" aria-hidden="true"></div>
    <img src="dollar.jpg" alt="" class="dollar-float" aria-hidden="true" />

    <header class="w-full max-w-6xl flex flex-col items-center gap-4 sm:gap-5 md:flex-row md:justify-between md:items-center md:gap-6 relative z-10">
        <div class="flex items-center gap-2">
            <img src="rendilogo.ico" alt="Rendi logo" class="h-24 w-24 rounded-xl object-cover sm:h-28 sm:w-28 md:h-40 md:w-40 xl:h-48 xl:w-48" />
        </div>
        <div class="w-full md:w-auto text-center md:text-right shrink-0">
            <a href="https://dashboard.rendi.pro" class="inline-flex items-center rounded-full border border-white/15 px-5 py-3 text-sm font-bold text-white transition hover:border-[#19e0a8] hover:text-[#19e0a8]">Acceso Usuarios →</a>
        </div>
    </header>

    <main class="w-full max-w-4xl text-center py-8 sm:py-10 md:py-12 relative z-10">
        <div class="inline-block px-3 py-1 rounded-full bg-[#19e0a8]/10 text-[#11b68a] text-[11px] sm:text-xs font-bold mb-5 md:mb-6 tracking-[0.25em] uppercase">
            WhatsApp + IA + Finanzas
        </div>
        <h1 class="text-4xl sm:text-5xl md:text-6xl xl:text-7xl font-extrabold tracking-tight text-gray-100 mb-6 sm:mb-7 md:mb-8 leading-[1.05] md:leading-[1.1]">
            Chau a las planillas.<br>Hola a <span class="text-[#19e0a8]">WhatsApp.</span>
        </h1>
        
           <!-- párrafo actualizado — tono emocional/manifesto -->
        <p class="text-base sm:text-lg md:text-xl text-gray-300 max-w-2xl mx-auto mb-10 sm:mb-12 md:mb-14 px-2 font-medium leading-relaxed md:leading-loose flex flex-col items-center">
            <span class="manifesto-line">Diseñado para los que siempre dicen <em class="not-italic text-white font-bold">"¿a dónde se fue la plata?"</em></span>
            
            <span class="manifesto-line mt-2 md:mt-3">Con Rendi, la respuesta llega sola.</span>
        </p>


        <div class="neo-card w-full p-6 sm:p-8 md:p-12 flex flex-col md:flex-row items-center gap-6 sm:gap-8 md:gap-16 justify-center">
            <div class="text-center md:text-left space-y-2">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Estado del Sistema</p>
                <h3 class="text-xl sm:text-2xl font-bold flex items-center justify-center md:justify-start gap-3">
                    Beta Privada 
                    <span class="flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-[#19e0a8] opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-[#19e0a8]"></span>
                    </span>
                </h3>
            </div>
            <div class="h-px md:h-12 w-full max-w-[160px] md:w-px md:max-w-none bg-gray-100/70"></div>
            <a href="#" class="btn-mint w-full sm:w-auto px-8 sm:px-12 py-4 sm:py-5 rounded-2xl text-black font-extrabold text-base sm:text-lg uppercase tracking-tight">
                QUIERO PROBARLO
            </a>
        </div>
    </main>

    <footer class="hidden w-full max-w-6xl border-t border-black/5 pt-12">
        <div class="space-y-2 text-center md:text-right">
            <p class="mono opacity-40 uppercase">Dashboard</p>
            <a href="https://rendi-dashboard.vercel.app" class="text-sm font-bold underline hover:text-[#19e0a8]">Acceso Usuarios →</a>
        </div>
    </footer>

<script>
    const glow = document.querySelector('.cursor-glow');
    const card = document.querySelector('.neo-card');
    const moneyFlow = document.querySelector('.money-flow');

    function randomAmount() {
        const value = Math.floor(25000 + Math.random() * 975000);
        return value.toLocaleString('es-PY');
    }

    function spawnMoneyTick() {
        if (!moneyFlow) return;

        const tick = document.createElement('span');
        const isIncome = Math.random() > 0.52;
        const prefix = isIncome ? '+ Gs. ' : '- Gs. ';
        tick.className = `money-tick ${isIncome ? 'money-in' : 'money-out'}`;
        tick.textContent = `${prefix}${randomAmount()}`;

        const startX = 6 + Math.random() * 88;
        const startY = 14 + Math.random() * 72;
        const dx = (Math.random() * 280 - 140).toFixed(0);
        const dy = (Math.random() * -220 - 30).toFixed(0);
        const size = (window.innerWidth < 768 ? 12 : 14) + Math.random() * 8;
        const dur = 6 + Math.random() * 3.5;

        tick.style.left = `${startX}%`;
        tick.style.top = `${startY}%`;
        tick.style.fontSize = `${size.toFixed(1)}px`;
        tick.style.setProperty('--dx', `${dx}px`);
        tick.style.setProperty('--dy', `${dy}px`);
        tick.style.setProperty('--dur', `${dur.toFixed(2)}s`);

        moneyFlow.appendChild(tick);
        tick.addEventListener('animationend', () => tick.remove());
    }

    for (let i = 0; i < 6; i += 1) {
        setTimeout(spawnMoneyTick, i * 420);
    }
    setInterval(spawnMoneyTick, 1400);

    document.addEventListener('mousemove', (event) => {
        glow.style.opacity = '1';
        glow.style.transform = `translate(${event.clientX - 160}px, ${event.clientY - 160}px)`;
    });

    document.addEventListener('mouseleave', () => {
        glow.style.opacity = '0';
    });

    if (card) {
        card.addEventListener('mousemove', (event) => {
            const rect = card.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const rotateY = ((x / rect.width) - 0.5) * 8;
            const rotateX = (0.5 - (y / rect.height)) * 8;
            card.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.boxShadow = '0 24px 45px rgba(0,0,0,0.35)';
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
            card.style.boxShadow = '0 20px 40px rgba(0,0,0,0.25)';
        });
    }
</script>
</body>
</html>
