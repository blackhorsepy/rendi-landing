<!DOCTYPE html>
<html lang="es">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDI — Capital Inteligente</title>
     <link rel="icon" type="image/x-icon" href="rendilogo.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #19e0a8; }
        body { 
            background-color: #000; 
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: crosshair;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .dollar-bg {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), 
                              url('https://www.publicdomainpictures.net/pictures/240000/velka/us-dollar-bill-background.jpg');
            background-size: auto, cover;
            background-position: center;
            background-blend-mode: multiply;
            filter: brightness(0.12) contrast(1.8) grayscale(100%); 
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        #cursor-glow {
            position: fixed;
            top: 0; left: 0;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(25, 224, 168, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .text-reveal {
            animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        @keyframes reveal {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .line-grow {
            inline-size: 0;
            animation: grow 1.5s ease-out 0.5s forwards;
        }
        @keyframes grow { to { inline-size: 100%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6 md:p-12">
    
    <div class="dollar-bg"></div>
    <div class="noise"></div>
    <div id="cursor-glow"></div>

    <header class="relative z-10 flex justify-between items-start w-full">
        <div class="space-y-1">
            <img src="rendilogo.ico" class="h-12 w-auto" alt="Rendi">
            <div class="mono text-[9px] opacity-40 uppercase tracking-widest">Protocolo de activos v.01</div>
        </div>
      
    </header>

    <main class="relative z-10 w-full">
        <div class="overflow-hidden">
            <h1 class="text-[13vw] md:text-[10vw] font-black leading-[0.85] tracking-tighter text-reveal select-none uppercase">
                Tu plata,<br>redefinida<span class="text-[#19e0a8]">.</span>
            </h1>
        </div>

        <div class="mt-8 flex flex-col md:flex-row items-start md:items-end gap-12">
            <div class="max-w-xs">
                <p class="text-gray-300 text-sm md:text-base leading-relaxed font-light border-l border-[#19e0a8]/30 pl-6 text-reveal" style="animation-delay: 0.2s;">
                    Arquitectura financiera para el capital moderno. Claridad absoluta, rendimiento global sin fricción.
                </p>
            </div>

            <div class="flex flex-wrap gap-6 items-center text-reveal" style="animation-delay: 0.4s;">
                <a href="#" class="group relative px-10 py-4 bg-[#19e0a8] text-black font-bold rounded-full transition-all hover:scale-105 active:scale-95 shadow-[0_0_40px_rgba(25,224,168,0.3)]">
                    LISTA DE ESPERA
                </a>
                <a href="#" class="mono text-[10px] tracking-[0.3em] font-bold border-b border-white/10 pb-1 hover:border-[#19e0a8] hover:text-[#19e0a8] transition-all uppercase">
                    Dashboard →
                </a>
            </div>
        </div>
    </main>

    <footer class="relative z-10 border-t border-white/5 pt-8 flex flex-col md:flex-row justify-between items-end gap-6 w-full">

            <div class="space-y-1">
                <p class="mono text-[9px] opacity-40 uppercase tracking-widest">Estado</p>
                <p class="text-xs font-bold tracking-tight flex items-center gap-2 uppercase">
                    Beta Privada <span class="h-1.5 w-1.5 bg-[#19e0a8] rounded-full animate-pulse shadow-[0_0_10px_#19e0a8]"></span>
                </p>
            </div>
        </div>

        <div class="hidden md:block">
            <span class="text-[6vw] font-black opacity-[0.03] select-none tracking-tighter uppercase">Rendi.Finance</span>
        </div>
    </footer>

    <script>
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });
        });
    </script>
</body>
</html>
